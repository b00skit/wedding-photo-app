<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Izbriši fotografije ≫ Poroka Davida & Sare</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="css/styles.css">
        <link rel="stylesheet" href="css/manage.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Mulish:wght@200;600&display=swap">
        <link rel="shortcut icon" href="images/app-icon.png" type="image/x-icon" />
    </head>
    <body>
        <header>
            <img class="header-decor" src="images/header.jpg" />
            <h1 class="site-title">David & Sara</h1>
            <span class="date">28.05.2023</span>
            <h2 style="text-align:center; font-family: Mulish; margin-top: 1em;">Izbriši fotografije</h2>
            <p style="text-align:center;">Vnesite geslo za brisanje izbranih elementov</p>
        </header>
        <section>
            <ul 
                id="gallery" 
                class="manageGallery manageDeleteGallery" 
                data-next-page="" 
                data-done="false" 
                data-page-size="20">
            </ul>

            <div id="spinner" class="hidden"><div></div></div>
            
            <p id="refreshLink" class="hidden">
                <span class="message">Ni več fotografij za prikaz.</span><br />
                <a class="action" href="#">Osveži za ogled novejših fotografij</a>
            </p>

            <form class="manageCommitForm" id="manageDeleteForm" method="get" action="/delete">
                <fieldset>
                    <input 
                        type="text" 
                        name="username" 
                        value="admin" 
                        autocomplete="username" 
                    />
                    <label for="manageDeletePassword">
                        Geslo: 
                        <input 
                            type="password" 
                            name="password" 
                            id="manageDeletePassword"
                            class="managePassword"
                            autocomplete="current-password"
                        />
                    </label>
                    
                    <button 
                        id="manageDeleteButton" 
                        class="button manageButton manageCommitButton requiresPassword"
                        data-call-to-action="Izbriši izbrano"
                        disabled>
                        Izbriši izbrano
                    </button>
                </fieldset>
            </form>
        </section>
        
        <div id="toast">
            <div class="timer"></div>
            <div class="message"></div>
        </div>

        <template id="galleryItem">
            <li>
                <a></a>
                <p class="bucketPath"></p>
            </li>
        </template>

        <script src="js/scripts.js"></script>
        <script src="js/manage.js"></script>
        <script src="js/delete.js"></script>
    </body>
</html>
