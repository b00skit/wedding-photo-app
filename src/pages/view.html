<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Ogled fotografij ≫ Poroka Davida & Sare</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="css/styles.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Mulish:wght@200;600&display=swap">
        <link rel="shortcut icon" href="images/app-icon.png" type="image/x-icon" />
    </head>
    <body>
        <header>
            <img class="header-decor" src="images/header.jpg" />
            <h1 class="site-title">David & Sara</h1>
            <span class="date">28.05.2023</span>
        </header>
        <section>
            <p>Upajmo, da ste preživeli čudovit dan!</p>

            <div style="margin: 2em 0; text-align: center;">
                <label for="uploaderFilter" style="font-weight: 600;">Filtriraj po imenu:</label>
                <select id="uploaderFilter" style="padding: 0.5em; border-radius: 0.5em; font-family: Mulish; margin-left: 0.5em;">
                    <option value="">Vse fotografije</option>
                </select>
            </div>

            <h3>Galerija</h3>
            <ul id="gallery" data-next-page="" data-done="false" data-num-videos="0"></ul>
            <div id="spinner" class="hidden"><div></div></div>

            <p id="refreshLink" class="hidden">
                <span class="message">Ni več fotografij za prikaz.</span><br />
                <a class="action" href="#">Osveži za ogled novejših fotografij</a>
            </p>

        </section>

        <div id="toast">
            <span class="message"></span>
            <div class="timer"></div>
        </div>

        <template id="galleryItem">
            <li>
                <a data-fslightbox="gallery"></a>
                <span class="uploaderBadge"></span>
            </li>
        </template>

        <script src="js/fslightbox.js"></script>
        <script src="js/scripts.js"></script>
    </body>
</html>
